<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  {%- if page.url == '/' -%}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Saurabh Purohit",
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "image": "{{ '/assets/me.png' | absolute_url }}",
    "description": "{{ site.tagline }}",
    "alumniOf": "Indian Institute of Technology Kanpur",
    "worksFor": [
      {
        "name": "Adobe",
        "url": "https://www.adobe.com/"
      },
      {
        "name": "Rephrase.ai",
        "url": "https://timesofindia.indiatimes.com/gadgets-news/adobe-buys-indian-generative-ai-startup-rephrase-ai-what-makes-the-deal-important/articleshow/105425071.cms"
      },
      {
        "name": "Microsoft Research",
        "url": "https://www.microsoft.com/en-us/research/lab/microsoft-research-india/"
      },
      {
        "name": "Goldman Sachs",
        "url": "https://www.goldmansachs.com/"
      }
    ],
    "sameAs": [
      "https://github.com/purohit10saurabh",
      "https://x.com/purohit10saurab"
    ]
  }
  </script>
  {%- endif -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false}],throwOnError:false});"></script>
  <script>addEventListener('DOMContentLoaded',()=>document.querySelectorAll('a[href]').forEach(a=>{if(a.host&&a.host!==location.host){a.target='_blank';a.rel='noopener noreferrer'}}));</script>
</head>
